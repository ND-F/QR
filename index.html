<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { 
            --main: #06444C; 
            --light: #EAE8D8; 
            --gold: #E1A93E; 
        }

        html, body { margin: 0; padding: 0; overflow-x: hidden; }

        body {
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .logoStrip {
            background: var(--light);
            padding: 35px 20px;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            margin-bottom: 50px;
        }
        .logo { width: 170px; display: block; margin: 0 auto; }

        /* GRID */
        .iconGrid {
            width: 95%;
            max-width: 450px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            justify-items: center;
        }

        /* ICON BUTTONS */
        .iconBtn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 95px; /* تكبير الحجم بناءً على طلبك */
            height: 95px;
            border-radius: 28px;
            font-size: 38px;
            text-decoration: none;
            background: var(--main);
            color: var(--light);
            border: 2px solid rgba(234, 232, 216, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        /* POP-OUT ANIMATION ON CLICK */
        .iconBtn:active {
            transform: scale(1.15) translateY(-10px); /* الحركة لبره ولأعلى */
            background: var(--gold);
            color: var(--main);
            border-color: var(--gold);
            z-index: 10;
        }

        /* SMART TOOLTIP (بالونة الكلام) */
        .iconBtn::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--light);
            color: var(--main);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s ease-out;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .iconBtn:hover::before, .iconBtn:active::before {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* WEBSITE BUTTON */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 90px;
            background: var(--gold) !important;
            color: var(--main) !important;
            font-size: 18px;
            font-weight: 700;
            gap: 15px;
            border: none;
        }
        .siteLogo { width: 40px; height: 40px; }

        /* MAP */
        .map {
            margin: 50px auto;
            width: 90%;
            max-width: 450px;
            height: 180px;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .map iframe { width: 100%; height: 100%; border: 0; }

        /* FLOAT BAR */
        .floatingBar {
            position: fixed;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 35px;
            border-radius: 50px;
            display: flex;
            gap: 30px;
            background: rgba(10, 30, 35, 0.9);
            backdrop-filter: blur(15px);
            border: 1.5px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
        }
        .ctrl { font-size: 26px; cursor: pointer; color: white; transition: 0.2s; }
        .ctrl:active { transform: scale(0.8); }

        /* LIGHT MODE */
        .light { background: var(--light); color: var(--main); }
        .light .iconBtn { background: white; color: var(--main); border-color: rgba(6, 68, 76, 0.1); }
        .light .iconBtn::before { background: var(--main); color: var(--light); }

        .footer { margin: 40px; opacity: .6; font-size: 14px; }
    </style>
</head>

<body class="lang-ar">

<div class="pageWrapper">
    <header class="logoStrip">
        <img class="logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Nadim Logo">
    </header>

    <div class="iconGrid">
        <a class="iconBtn website" href="https://www.nadimfoundation.org/" id="webBtn" data-ar="الموقع الرئيسي" data-en="Official Website">
            <img class="siteLogo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg" alt="Icon">
            <span id="webText">الموقع الرئيسي - Official Website</span>
        </a>

        <a class="iconBtn" href="https://www.facebook.com/share/1Ak98MWsP4/" data-ar="فيسبوك" data-en="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a class="iconBtn" href="https://www.instagram.com/nadimfoundation" data-ar="إنستجرام" data-en="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a class="iconBtn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA" data-ar="يوتيوب" data-en="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a class="iconBtn" href="https://www.linkedin.com/company/nadimfoundation/" data-ar="لينكد إن" data-en="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a class="iconBtn" href="mailto:info@nadimfoundation.org" data-ar="بريد إلكتروني" data-en="Email"><i class="fa-solid fa-envelope"></i></a>
        <a class="iconBtn" href="https://wa.me/201227799564" data-ar="واتساب" data-en="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3454.218585149319!2d31.2357!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzM5LjgiTiAzMcKwMTQnMDguNSJF!5e0!3m2!1sen!2seg!4v1712880000000!5m2!1sen!2seg" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <div class="footer">Nadim Foundation - مؤسسة نديم © ®</div>
</div>

<div class="floatingBar">
    <div class="ctrl" id="shareBtn" onclick="share()">🔗</div>
    <div class="ctrl" id="themeBtn" onclick="toggleTheme()">☀️</div>
    <div class="ctrl" id="langBtn" onclick="toggleLang()">🌐</div>
</div>

<script>
    let currentLang = 'ar';
    const body = document.body;

    function updateLabels() {
        document.querySelectorAll('.iconBtn').forEach(btn => {
            const label = btn.getAttribute(`data-${currentLang}`);
            btn.setAttribute('data-tooltip', label || '');
        });
        const webText = document.getElementById('webText');
        webText.innerHTML = currentLang === 'ar' ? "الموقع الرئيسي" : "Official Website";
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        updateLabels();
    }

    function toggleTheme() {
        body.classList.toggle("light");
        document.getElementById("themeBtn").innerHTML = body.classList.contains("light") ? "🌙" : "☀️";
    }

    function share() {
        if (navigator.share) {
            navigator.share({ title: "Nadim Foundation", url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("تم نسخ الرابط! - Link Copied!");
        }
    }

    // تشغيل التسميات عند التحميل
    window.onload = updateLabels;
</script>

</body>
</html>
