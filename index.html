<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { 
            --main: #06444C; 
            --light: #EAE8D8; 
            --gold: #E1A93E; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            transition: background 0.4s;
        }

        .pageWrapper {
            opacity: 0;
            animation: pageIn 0.6s forwards;
        }

        @keyframes pageIn { to { opacity: 1; } }

        /* HEADER */
        .logoStrip {
            background: var(--light);
            padding: 30px 20px;
            border-radius: 0 0 45px 45px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .logo { width: 160px; display: block; margin: 0 auto; }

        /* GRID */
        .iconGrid {
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* ICON BUTTONS (التعديل الجذري هنا) */
        .iconBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 22px;
            font-size: 32px;
            text-decoration: none;
            /* اللون الكحلي هو الأساسي للأيقونة */
            background: var(--main);
            color: var(--light);
            border: 1.5px solid rgba(234, 232, 216, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        /* WEBSITE BUTTON */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 85px;
            background: var(--gold) !important;
            color: var(--main) !important;
            font-size: 18px;
            font-weight: 700;
            gap: 15px;
            border: none;
        }

        .siteLogo { width: 35px; height: 35px; }

        /* LIGHT MODE ADAPTATION */
        .light { background: var(--light); color: var(--main); }
        .light .iconBtn {
            background: var(--main); /* هيفضل كحلي عشان يبرز على الخلفية الكريمي */
            color: var(--light);
        }

        /* MAP */
        .map {
            margin: 40px auto;
            width: 90%;
            max-width: 400px;
            height: 160px;
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid var(--gold);
        }
        .map iframe { width: 100%; height: 100%; border: 0; }

        /* FLOAT BAR */
        .floatingBar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 30px;
            background: rgba(10, 30, 35, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold);
            z-index: 1000;
        }

        .ctrl { font-size: 24px; cursor: pointer; color: white; }

        .footer { margin-top: 40px; opacity: .5; font-size: 13px; }

    </style>
</head>

<body>

<div class="pageWrapper">

    <header class="logoStrip">
        <img class="logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Nadim Foundation Logo">
    </header>

    <div class="iconGrid">

        <a class="iconBtn website" href="https://www.nadimfoundation.org/">
            <img class="siteLogo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg" alt="Nadim Icon">
            <span>الموقع الرسمي - Official Website</span>
        </a>

        <a class="iconBtn" href="https://www.facebook.com/share/1Ak98MWsP4/"><i class="fa-brands fa-facebook-f"></i></a>
        <a class="iconBtn" href="https://www.instagram.com/nadimfoundation"><i class="fa-brands fa-instagram"></i></a>
        <a class="iconBtn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA"><i class="fa-brands fa-youtube"></i></a>
        <a class="iconBtn" href="https://www.linkedin.com/company/nadimfoundation/"><i class="fa-brands fa-linkedin-in"></i></a>
        <a class="iconBtn" href="mailto:info@nadimfoundation.org"><i class="fa-solid fa-envelope"></i></a>
        <a class="iconBtn" href="https://wa.me/201227799564"><i class="fa-brands fa-whatsapp"></i></a>

    </div>

    <div class="map">
        <iframe src="https://maps.google.com/maps?q=cairo&t=&z=13&ie=UTF8&iwloc=&output=embed" title="Location"></iframe>
    </div>

    <div class="footer">
        Nadim Foundation - مؤسسة نديم © ®
    </div>

</div>

<div class="floatingBar">
    <div class="ctrl" onclick="share()">🔗</div>
    <div class="ctrl" id="themeBtn" onclick="toggleTheme()">☀️</div>
</div>

<script>
    const body = document.body;
    const btn = document.getElementById("themeBtn");

    function toggleTheme() {
        body.classList.toggle("light");
        const isLight = body.classList.contains("light");
        btn.innerHTML = isLight ? "🌙" : "☀️";
    }

    function share() {
        if (navigator.share) {
            navigator.share({ title: "Nadim Foundation", url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("تم نسخ الرابط!");
        }
    }
</script>

</body>
</html>
