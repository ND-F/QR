<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; }

        body {
            margin: 0; padding: 0;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .logoStrip {
            background: var(--light); /* كريمي كخلفية افتراضية */
            padding: 30px 20px;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            margin-bottom: 60px;
        }
        .logo { width: 160px; display: block; margin: 0 auto; }

        /* GRID */
        .iconGrid {
            width: 90%;
            max-width: 450px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            justify-items: center;
            direction: ltr !important; 
        }

        /* ICON BUTTONS */
        .iconBtn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px; 
            height: 90px;
            border-radius: 26px;
            font-size: 35px;
            text-decoration: none;
            background: var(--main); /* كحلي نديم خلفية */
            color: var(--light); /* رمز كريمي */
            border: 2px solid rgba(234, 232, 216, 0.2);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            z-index: 1;
        }

        /* Pop-out Animation & Gold interaction on Hover/Active (الموحدة) */
        @media (hover: hover) {
            .iconBtn:hover, .ctrl:hover {
                transform: scale(1.12) translateY(-10px);
                color: var(--gold); /* الرمز ذهبي عند الـ hover */
                border-color: var(--gold); /* الحافة ذهبية عند الـ hover */
                background: rgba(234, 232, 216, 0.1);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
                z-index: 10;
            }
        }

        .iconBtn:active, .ctrl:active { transform: scale(0.95); }

        /* Tooltip (بالونة الكلام) */
        ...

        /* WEBSITE BUTTON */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 85px;
            background: var(--main); /* كحلي نديم افتراضي ليتوافق مع بقية الأزرار */
            color: var(--light);
            font-size: 18px;
            font-weight: 700;
            gap: 12px;
            margin-bottom: 10px;
        }
        ...

        /* MAP */
        ...

        /* FLOAT BAR (تثبيت الألوان) */
        .floatingBar {
            position: fixed;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 25px;
            background: rgba(10, 30, 35, 0.95); /* تثبيت المظهر الزجاجي الداكن */
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            direction: ltr !important; 
        }
        .ctrl { 
            position: relative;
            font-size: 24px; 
            cursor: pointer; 
            color: white; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        /* LIGHT MODE ADAPTATION (إزالة معظم تعديلات الثيم الفاتح) */
        .light { background: var(--light); color: var(--main); }
        
        /* جعل الأيقونات في الثيم الفاتح تأخذ خلفية داكنة (مثل كحلي نديم #06444C) */
        .light .iconBtn { 
            background: var(--main); 
            color: var(--light); /* رمز كريمي على خلفية كحلي نديم */
            border: 2px solid rgba(234, 232, 216, 0.2); 
        }
        
        /* جعل الـ Tooltips في الثيم الفاتح كريمية على كحلية نديم */
        .light .iconBtn::before, .light .ctrl::before { background: var(--main); color: var(--light); }
        
        /* إلغاء تعديلات صندوق التحكم العلوي والسفلي في الثيم الفاتح */
        /* .light .logoStrip {} */
        /* .light .floatingBar {} */
        
        /* جعل رموز شريط التحكم كريمية على خلفية زجاجية داكنة */
        .light .ctrl { color: white; }

        .footer { margin-top: 40px; opacity: .5; font-size: 13px; }
    </style>
</head>

<body class="lang-ar">

<div class="pageWrapper">
    <header class="logoStrip">
        <img class="logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Nadim Logo">
    </header>

    <div class="iconGrid">
        <a class="iconBtn website" href="https://www.nadimfoundation.org/" id="webBtn" data-ar="الموقع الرئيسي" data-en="Official Website">
            <img class="siteLogo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg" alt="Icon">
            <span id="webText">الموقع الرئيسي - Official Website</span>
        </a>

        ...
    </div>

    ...

    <div class="footer">Nadim Foundation - مؤسسة نديم © ®</div>
</div>

<div class="floatingBar">
    <div class="ctrl" id="shareBtn" onclick="share()" data-ar="مشاركة" data-en="Share">🔗</div>
    <div class="ctrl" id="themeBtn" onclick="toggleTheme()" data-ar="المظهر" data-en="Theme">☀️</div>
    <div class="ctrl" id="langBtn" onclick="toggleLang()" data-ar="اللغة" data-en="Language">🌐</div>
</div>

<script>
    const body = document.body;
    const themeBtn = document.getElementById("themeBtn");
    const webText = document.getElementById("webText");
    
    // 1. اكتشاف اللغة المفضلة للجهاز
    const systemLang = navigator.language || navigator.userLanguage;
    let currentLang = systemLang.startsWith('ar') ? 'ar' : 'en';

    // 2. اكتشاف ثيم الجهاز
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function updateLabels() {
        document.querySelectorAll('[data-ar]').forEach(el => {
            const label = el.getAttribute(`data-${currentLang}`);
            el.setAttribute('data-tooltip', label || '');
        });
        
        webText.innerHTML = currentLang === 'ar' ? "الموقع الرئيسي" : "Official Website";
        
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light" || (!savedTheme && !prefersDark)) {
            body.classList.add("light");
            themeBtn.innerHTML = "🌙";
        } else {
            body.classList.remove("light");
            themeBtn.innerHTML = "☀️";
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        updateLabels();
    }

    function toggleTheme() {
        body.classList.toggle("light");
        const isLight = body.classList.contains("light");
        themeBtn.innerHTML = isLight ? "🌙" : "☀️";
        localStorage.setItem("theme", isLight ? "light" : "dark");
    }

    function share() {
        if (navigator.share) {
            navigator.share({ title: "Nadim Foundation", url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert(currentLang === 'ar' ? "تم نسخ الرابط!" : "Link Copied!");
        }
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            if (savedTheme === "light") body.classList.add("light");
        } else if (!prefersDark) {
            body.classList.add("light");
        }
        updateLabels();
    };
</script>

</body>
</html>
