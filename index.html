<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="images/nadim-icon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { 
            --main: #06444C; 
            --light: #EAE8D8; 
            --gold: #E1A93E; 
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            transition: background 0.4s, color 0.4s;
            direction: ltr; /* للحفاظ على ترتيب أيقونات السوشيال ميديا */
        }

        .pageWrapper {
            opacity: 0;
            transform: translateY(20px);
            animation: pageIn 0.6s forwards;
        }

        @keyframes pageIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .light {
            background: var(--light) !important;
            color: var(--main) !important;
        }

        /* HEADER */
        .logoStrip {
            background: var(--light);
            padding: 25px;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo {
            width: 150px;
            display: block;
            margin: 0 auto;
        }

        /* GRID */
        .iconGrid {
            width: 90%;
            max-width: 420px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            justify-items: center;
        }

        /* ICON BUTTON */
        .iconBtn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 85px;
            height: 85px;
            border-radius: 24px;
            font-size: 32px;
            color: var(--light);
            text-decoration: none;
            background: rgba(234, 232, 216, 0.1); /* كريمي شفاف */
            border: 1px solid rgba(234, 232, 216, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
        }

        /* WEBSITE BUTTON - التميز الذهبي */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 85px;
            background: var(--gold) !important;
            color: var(--main) !important;
            font-size: 17px;
            font-weight: 700;
            gap: 15px;
            border: none;
        }

        .siteLogo {
            width: 38px;
            height: 38px;
        }

        /* HOVER EFFECTS */
        @media (hover: hover) {
            .iconBtn:hover {
                transform: translateY(-5px);
                background: rgba(234, 232, 216, 0.2);
                box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
                color: var(--gold);
            }
            .website:hover {
                filter: brightness(1.1);
                color: var(--main);
            }
        }

        /* LIGHT MODE ADAPTATION */
        .light .iconBtn {
            background: white;
            color: var(--main);
            border: 1px solid rgba(6, 68, 76, 0.1);
        }
        .light .logoStrip {
            border-bottom: 1px solid rgba(6, 68, 76, 0.1);
        }

        /* MAP */
        .map {
            margin: 30px auto;
            width: 90%;
            max-width: 420px;
            height: 180px;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid rgba(225, 169, 62, 0.3);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        .map iframe {
            width: 100%;
            height: 100%;
            border: 0;
            filter: grayscale(0.3) contrast(1.1);
        }

        /* FLOATING BAR (Glassmorphism) */
        .floatingBar {
            position: fixed;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 25px;
            background: rgba(10, 30, 35, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(225, 169, 62, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2000;
        }

        .ctrl {
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl:active { transform: scale(0.8); }

        .footer {
            margin: 40px;
            opacity: .5;
            font-size: 13px;
            font-weight: 400;
        }

    </style>
</head>

<body>

<div class="pageWrapper">

    <header class="logoStrip">
        <img class="logo" src="images/logo-nadim.png" alt="Nadim Foundation Logo">
    </header>

    <div class="iconGrid">

        <a class="iconBtn website" href="https://www.nadimfoundation.org/">
            <img class="siteLogo" src="images/nadim-icon.svg" alt="Nadim Icon">
            <span>الموقع الرسمي - Official Website</span>
        </a>

        <a class="iconBtn" href="https://www.facebook.com/share/1Ak98MWsP4/" aria-label="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a class="iconBtn" href="https://www.instagram.com/nadimfoundation" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a class="iconBtn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA" aria-label="YouTube">
            <i class="fa-brands fa-youtube"></i>
        </a>

        <a class="iconBtn" href="https://www.linkedin.com/company/nadimfoundation/" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in"></i>
        </a>

        <a class="iconBtn" href="mailto:info@nadimfoundation.org" aria-label="Email">
            <i class="fa-solid fa-envelope"></i>
        </a>

        <a class="iconBtn" href="https://wa.me/201227799564" aria-label="WhatsApp">
            <i class="fa-brands fa-whatsapp"></i>
        </a>

    </div>

    <div class="map">
        <iframe 
            src="https://maps.google.com/maps?q=cairo&t=&z=13&ie=UTF8&iwloc=&output=embed" 
            title="Location">
        </iframe>
    </div>

    <div class="footer">
        Nadim Foundation - مؤسسة نديم © ®
    </div>

</div>

<div class="floatingBar">
    <div class="ctrl" onclick="share()">🔗</div>
    <div class="ctrl" id="themeBtn" onclick="toggleTheme()">☀️</div>
</div>

<script>
    const body = document.body;
    const btn = document.getElementById("themeBtn");

    // تهيئة الثيم
    (function initTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
            body.classList.add("light");
            btn.innerHTML = "🌙";
        }
    })();

    function toggleTheme() {
        body.classList.toggle("light");
        const isLight = body.classList.contains("light");
        btn.innerHTML = isLight ? "🌙" : "☀️";
        localStorage.setItem("theme", isLight ? "light" : "dark");
    }

    function share() {
        if (navigator.share) {
            navigator.share({
                title: "Nadim Foundation - مؤسسة نديم",
                url: window.location.href
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("تم نسخ الرابط بنجاح - Link Copied!");
            });
        }
    }
</script>

</body>
</html>
