<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { 
            --main: #06444C; 
            --light: #EAE8D8; 
            --gold: #E1A93E; 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .logoStrip {
            background: var(--light);
            padding: 30px 20px;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            margin-bottom: 60px;
        }
        .logo { width: 250px; display: block; margin: 0 auto; }

        /* GRID */
        .iconGrid {
            width: 90%;
            max-width: 450px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            justify-items: center;
            direction: ltr !important; 
        }
            
/* ICON BUTTONS */
        .iconBtn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px; 
            height: 90px;
            border-radius: 26px;
            font-size: 35px;
            text-decoration: none;
            background: var(--main);
            color: var(--light);
            border: 2px solid transparent;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
            z-index: 1;
            
            /* تنعيم الزرار نفسه */
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        /* السر هنا: تنعيم المحتوى الداخلي للزرار (الأيقونات والصور والنصوص) لمنع رعشة التكبير */
        .iconBtn i, .iconBtn img, .iconBtn span {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        /* التفاعل عند الماوس (Hover) */
        @media (hover: hover) {
            .iconBtn:hover {
                /* ترتيب translateY قبل scale بيقلل المشاكل في بعض المتصفحات */
                transform: translateY(-10px) scale(1.12);
                color: var(--gold) !important;
                border-color: var(--gold);
                background: rgba(234, 232, 216, 0.05);
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
                z-index: 10;
            }
        }

        /* التفاعل عند اللمس (Mobile Active) */
        .iconBtn:active {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--gold);
            color: var(--gold) !important;
            transition: all 0.1s;
        }
            
            /* Tooltip */
            .iconBtn::before, .ctrl::before {
                content: attr(data-tooltip);
                position: absolute;
                bottom: 125%;
                left: 50%;
                /* ضفنا translateZ(0) للتولتيب عشان مايهزش وهو بيظهر */
                transform: translateX(-50%) translateY(10px) translateZ(0);
                background: var(--main);
                color: var(--light);
                padding: 8px 15px;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 700;
                white-space: nowrap;
                opacity: 0;
                visibility: hidden;
                transition: 0.3s ease;
                box-shadow: 0 8px 20px rgba(0,0,0,0.3);
                pointer-events: none;
                z-index: 1000;
            }
            
            .iconBtn:hover::before, .ctrl:hover::before {
                opacity: 1;
                visibility: visible;
                transform: translateX(-50%) translateY(0) translateZ(0);
            }
        
        /* WEBSITE BUTTON */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 85px;
            background: var(--main);
            color: var(--light);
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .siteLogo { width: 38px; height: 38px; flex-shrink: 0; }

        /* --- إعدادات اللوجو بناءً على الثيم --- */
        .light-logo { display: none; }
        .dark-logo { display: block; }
        
        .light .light-logo { display: block; }
        .light .dark-logo { display: none; }
        /* ------------------------------------- */

        /* MAP */
        .map {
            margin: 50px auto;
            width: 90%;
            max-width: 450px;
            height: 180px;
            border-radius: 28px;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .map iframe { width: 100%; height: 100%; border: 0; }

        /* FLOAT BAR */
        .floatingBar {
            position: fixed;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 25px;
            background: rgba(10, 30, 35, 0.96);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            direction: ltr !important; 
        }
        .ctrl { 
            position: relative;
            font-size: 24px; 
            cursor: pointer; 
            color: white; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        /* LIGHT MODE */
        .light { background: var(--light); color: var(--main); }
        .light .iconBtn { 
            background: var(--light); /* البوكس مختفي في الخلفية الكريمي */
            color: var(--main);       /* الرمز أخضر غامق */
            border-color: transparent;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
        }
        .light .website { background: var(--light); border: 2px solid transparent; }
        
        /* تفعيل الحواف الذهبية في اللايت مود عند التفاعل */
        .light .iconBtn:hover, .light .iconBtn:active { 
            border-color: var(--gold); 
            background: var(--light); 
        }

        .footer { margin-top: 40px; opacity: .5; font-size: 13px; }
        .lang-ar { direction: rtl; }
        .lang-en { direction: ltr; }
    </style>
</head>

<body class="lang-ar">

<div class="pageWrapper">
    <header class="logoStrip">
        <img class="logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim-site.png" alt="Nadim Logo">
    </header>

    <div class="iconGrid">
        <a class="iconBtn website" href="https://www.nadimfoundation.org/" id="webBtn" data-ar="الموقع الرئيسي" data-en="Official Website">
            <img class="siteLogo light-logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Icon Left">
            <img class="siteLogo dark-logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim-light.png" alt="Icon Left">
            
            <span id="webText">Nadim Foundation</span>
            
            <img class="siteLogo light-logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Icon Right">
            <img class="siteLogo dark-logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim-light.png" alt="Icon Right">
        </a>

        <a class="iconBtn" href="https://www.facebook.com/share/1Ak98MWsP4/" data-ar="فيسبوك" data-en="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a class="iconBtn" href="https://www.instagram.com/nadimfoundation" data-ar="إنستجرام" data-en="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a class="iconBtn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA" data-ar="يوتيوب" data-en="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a class="iconBtn" href="https://www.linkedin.com/company/nadimfoundation/" data-ar="لينكد إن" data-en="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a class="iconBtn" href="mailto:info@nadimfoundation.org" data-ar="بريد إلكتروني" data-en="Email"><i class="fa-solid fa-envelope"></i></a>
        <a class="iconBtn" href="https://wa.me/201227799564" data-ar="واتساب" data-en="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3452.0958367247654!2d31.019325891417864!3d30.09144151018166!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14585c79ad6b7e2d%3A0xe93b0ce5bf4942be!2sNADIM%20-%20Headquarters%20%26%20Factory!5e0!3m2!1sen!2sus!4v1776644304719!5m2!1sen!2sus" width="800" height="600" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <div class="footer">Nadim Foundation - مؤسسة نديم © ®</div>
    </div>

    <div class="floatingBar">
    <div class="ctrl" id="shareBtn" onclick="share()" data-ar="مشاركة" data-en="Share">🔗</div>
    <div class="ctrl" id="themeBtn" onclick="toggleTheme()" data-ar="المظهر" data-en="Theme">☀️</div>
    <div class="ctrl" id="langBtn" onclick="toggleLang()" data-ar="اللغة" data-en="Language">🌐</div>
    </div>

<script>
    const body = document.body;
    const themeBtn = document.getElementById("themeBtn");
    const webText = document.getElementById("webText");
    
    const systemLang = navigator.language || navigator.userLanguage;
    let currentLang = systemLang.startsWith('ar') ? 'ar' : 'en';
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function updateLabels() {
        document.querySelectorAll('[data-ar]').forEach(el => {
            const label = el.getAttribute(`data-${currentLang}`);
            el.setAttribute('data-tooltip', label || '');
        });
        
        webText.innerHTML = currentLang === 'ar' ? "مؤسسة نديم" : "Nadim Foundation";
        
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light" || (!savedTheme && !prefersDark)) {
            body.classList.add("light");
            themeBtn.innerHTML = "🌙";
        } else {
            body.classList.remove("light");
            themeBtn.innerHTML = "☀️";
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        updateLabels();
    }

    function toggleTheme() {
        body.classList.toggle("light");
        const isLight = body.classList.contains("light");
        themeBtn.innerHTML = isLight ? "🌙" : "☀️";
        localStorage.setItem("theme", isLight ? "light" : "dark");
    }

    function share() {
        if (navigator.share) {
            navigator.share({ title: "Nadim Foundation", url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert(currentLang === 'ar' ? "تم نسخ الرابط!" : "Link Copied!");
        }
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            if (savedTheme === "light") body.classList.add("light");
        } else if (!prefersDark) {
            body.classList.add("light");
        }
        updateLabels();
    };
</script>

</body>
</html>
