<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --main: #06444C; --light: #EAE8D8; --gold: #E1A93E; }

        body {
            margin: 0; padding: 0;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            transition: background 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .logoStrip {
            background: var(--light);
            padding: 30px 20px;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            margin-bottom: 60px;
        }
        .logo { width: 160px; display: block; margin: 0 auto; }

        /* GRID - ثبتنا الاتجاه هنا عشان الذاكرة العضلية */
        .iconGrid {
            width: 90%;
            max-width: 450px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            justify-items: center;
            direction: ltr !important; /* تثبيت الأيقونات في مكانها مهما كانت اللغة */
        }

        /* ICON BUTTONS */
        .iconBtn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px; 
            height: 90px;
            border-radius: 26px;
            font-size: 35px;
            text-decoration: none;
            background: var(--main);
            color: var(--light);
            border: 2px solid rgba(234, 232, 216, 0.2);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            z-index: 1;
        }

        /* Pop-out Animation */
        @media (hover: hover) {
            .iconBtn:hover, .ctrl:hover {
                transform: scale(1.12) translateY(-10px);
                border-color: var(--gold);
                color: var(--gold);
                z-index: 10;
            }
        }

        .iconBtn:active, .ctrl:active { transform: scale(0.95); }

        /* Tooltip (بالونة الكلام) */
        .iconBtn::before, .ctrl::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--light);
            color: var(--main);
            padding: 7px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .iconBtn:hover::before, .ctrl:hover::before {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* WEBSITE BUTTON */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 85px;
            background: var(--main);
            color: var(--light);
            font-size: 18px;
            font-weight: 700;
            gap: 12px;
            margin-bottom: 10px;
        }
        .siteLogo { width: 38px; height: 38px; }

        /* MAP */
        .map {
            margin: 50px auto;
            width: 90%;
            max-width: 450px;
            height: 170px;
            border-radius: 28px;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .map iframe { width: 100%; height: 100%; border: 0; }

        /* FLOAT BAR - تثبيت الترتيب هنا أيضاً */
        .floatingBar {
            position: fixed;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 50px;
            display: flex;
            gap: 30px;
            background: rgba(10, 30, 35, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            direction: ltr !important; 
        }
        .ctrl { 
            position: relative;
            font-size: 24px; 
            cursor: pointer; 
            color: white; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        /* LIGHT MODE */
        .light { background: var(--light); color: var(--main); }
        .light .iconBtn { background: white; color: var(--main); border-color: rgba(6, 68, 76, 0.1); }
        .light .iconBtn::before, .light .ctrl::before { background: var(--main); color: var(--light); }
        .light .floatingBar { background: rgba(255, 255, 255, 0.9); border-color: var(--main); }
        .light .ctrl { color: var(--main); }

        .footer { margin-top: 40px; opacity: .5; font-size: 13px; }
    </style>
</head>

<body>

<div class="pageWrapper">
    <header class="logoStrip">
        <img class="logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Nadim Logo">
    </header>

    <div class="iconGrid">
        <a class="iconBtn website" href="https://www.nadimfoundation.org/" id="webBtn" data-ar="الموقع الرئيسي" data-en="Official Website">
            <img class="siteLogo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg" alt="Icon">
            <span id="webText">الموقع الرئيسي - Official Website</span>
        </a>

        <a class="iconBtn" href="https://www.facebook.com/share/1Ak98MWsP4/" data-ar="فيسبوك" data-en="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a class="iconBtn" href="https://www.instagram.com/nadimfoundation" data-ar="إنستجرام" data-en="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a class="iconBtn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA" data-ar="يوتيوب" data-en="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a class="iconBtn" href="https://www.linkedin.com/company/nadimfoundation/" data-ar="لينكد إن" data-en="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a class="iconBtn" href="mailto:info@nadimfoundation.org" data-ar="بريد إلكتروني" data-en="Email"><i class="fa-solid fa-envelope"></i></a>
        <a class="iconBtn" href="https://wa.me/201227799564" data-ar="واتساب" data-en="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3454.212727653606!2d31.2581691!3d30.0307996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14583f707f43377f%3A0xc3f6079d3907e3f!2sNadim%20Foundation!5e0!3m2!1sen!2seg!4v1712880000000!5m2!1sen!2seg" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <div class="footer">Nadim Foundation - مؤسسة نديم © ®</div>
</div>

<div class="floatingBar">
    <div class="ctrl" id="shareBtn" onclick="share()" data-ar="مشاركة" data-en="Share">🔗</div>
    <div class="ctrl" id="themeBtn" onclick="toggleTheme()" data-ar="المظهر" data-en="Theme">☀️</div>
    <div class="ctrl" id="langBtn" onclick="toggleLang()" data-ar="اللغة" data-en="Language">🌐</div>
</div>

<script>
    const body = document.body;
    const themeBtn = document.getElementById("themeBtn");
    const webText = document.getElementById("webText");
    
    const systemLang = navigator.language || navigator.userLanguage;
    let currentLang = systemLang.startsWith('ar') ? 'ar' : 'en';
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function updateLabels() {
        document.querySelectorAll('[data-ar]').forEach(el => {
            const label = el.getAttribute(`data-${currentLang}`);
            el.setAttribute('data-tooltip', label || '');
        });
        
        webText.innerHTML = currentLang === 'ar' ? "الموقع الرئيسي" : "Official Website";
        
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light" || (!savedTheme && !prefersDark)) {
            body.classList.add("light");
            themeBtn.innerHTML = "🌙";
        } else {
            body.classList.remove("light");
            themeBtn.innerHTML = "☀️";
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        updateLabels();
    }

    function toggleTheme() {
        body.classList.toggle("light");
        const isLight = body.classList.contains("light");
        themeBtn.innerHTML = isLight ? "🌙" : "☀️";
        localStorage.setItem("theme", isLight ? "light" : "dark");
    }

    function share() {
        if (navigator.share) {
            navigator.share({ title: "Nadim Foundation", url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert(currentLang === 'ar' ? "تم نسخ الرابط!" : "Link Copied!");
        }
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            if (savedTheme === "light") body.classList.add("light");
        } else if (!prefersDark) {
            body.classList.add("light");
        }
        updateLabels();
    };
</script>

</body>
</html>
