<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nadim Foundation - مؤسسة نديم</title>

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ND-F/Q/main/images/nadim-icon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { 
            --main: #06444C; 
            --light: #EAE8D8; 
            --gold: #E1A93E; 
        }

        html, body { margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            background: var(--main);
            color: var(--light);
            padding-bottom: calc(120px + env(safe-area-inset-bottom));
            transition: background 0.4s, color 0.4s;
            -webkit-font-smoothing: antialiased;
        }

        .pageWrapper {
            opacity: 0;
            transform: translateY(20px);
            animation: pageIn 0.6s forwards;
        }
        @keyframes pageIn { to { opacity: 1; transform: translateY(0); } }

        .light { background: var(--light); color: var(--main); }

        /* HEADER */
        .logoStrip {
            background: var(--light);
            padding: 25px;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }
        .logo { width: 150px; display: block; margin: 0 auto; }

        /* GRID */
        .iconGrid {
            width: 90%;
            max-width: 420px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
        }

        /* ICON BUTTON & TOOLTIP LOGIC */
        .iconBtn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 22px;
            font-size: 30px;
            text-decoration: none;
            background: var(--main);
            color: var(--light);
            border: 1.5px solid rgba(234, 232, 216, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        /* Click Animation (Scale Down) */
        .iconBtn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        /* Tooltip Box */
        .iconBtn::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: var(--light);
            color: var(--main);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* Tooltip Arrow */
        .iconBtn::after {
            content: "";
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--light);
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        @media (hover: hover) {
            .iconBtn:hover::before, .iconBtn:hover::after {
                opacity: 1;
                visibility: visible;
                transform: translateX(-50%) translateY(-5px);
            }
            .iconBtn:hover { border-color: var(--gold); color: var(--gold); }
        }

        /* WEBSITE BUTTON */
        .website {
            grid-column: 1 / span 3;
            width: 100%;
            height: 80px;
            background: var(--gold) !important;
            color: var(--main) !important;
            font-size: 16px;
            font-weight: 700;
            gap: 12px;
            border: none;
        }
        .siteLogo { width: 36px; height: 36px; }

        /* LIGHT MODE ADAPTATION */
        .light .iconBtn { background: white; color: var(--main); border: 1.5px solid rgba(6, 68, 76, 0.1); }
        .light .iconBtn::before { background: var(--main); color: var(--light); }
        .light .iconBtn::after { border-top-color: var(--main); }

        /* MAP */
        .map {
            margin: 30px auto;
            width: 90%;
            max-width: 420px;
            height: 150px;
            border-radius: 18px;
            overflow: hidden;
            border: 2.5px solid var(--gold);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }
        .map iframe { width: 100%; height: 100%; border: 0; }

        /* FLOAT BAR */
        .floatingBar {
            position: fixed;
            bottom: calc(18px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            gap: 20px;
            background: rgba(10, 30, 35, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .25);
            z-index: 999;
        }
        .ctrl { font-size: 22px; cursor: pointer; color: white; -webkit-tap-highlight-color: transparent; }

        .footer { margin: 30px; opacity: .6; font-size: 14px; }
    </style>
</head>
