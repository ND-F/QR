<style>
/* تحسين الأداء العام */
body {
    margin: 0;
    font-family: system-ui, Arial, sans-serif;
    text-align: center;
    background: #0f2024;
    color: #e9f6f7;
    /* أزلنا الانتقال العام والأنيميشن من هنا */
    padding-bottom: 120px;
    -webkit-font-smoothing: antialiased; /* تحسين الخط لسفاري */
}

/* حاوية للأنيميشن بدلاً من الجسم بالكامل */
.page-wrapper {
    opacity: 0;
    transform: translateY(15px);
    animation: pageIn .5s ease-out forwards;
}

@keyframes pageIn {
    to { opacity: 1; transform: translateY(0); }
}

/* تحسين انتقال الألوان عند تغيير الثيم */
.light {
    background: #f4f7f8;
    color: #0c4f57;
}

/* تحديد الانتقال للألوان فقط لتقليل الجهد */
body.light, body {
    transition: background-color 0.3s ease;
}

/* HEADER */
.logoStrip {
    background: #e9f6f7;
    padding: 22px;
    border-radius: 0 0 40px 40px;
}

.logo { width: 140px; height: auto; }

/* GRID */
.iconGrid {
    width: 90%;
    max-width: 420px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    justify-items: center;
}

/* ICON BUTTON */
.iconBtn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    border-radius: 22px;
    font-size: 30px;
    color: #28c3cc;
    text-decoration: none;
    background: rgba(255,255,255,.08);
    box-shadow: 0 8px 20px rgba(0,0,0,.15);
    transition: transform .2s, box-shadow .2s;
    /* تحسين الأداء في سفاري */
    will-change: transform;
}

/* تأثيرات الـ Hover المفرطة تسبب ثقلاً في سفاري، تم تبسيطها */
.iconBtn:active {
    transform: scale(0.9);
}

.light .iconBtn {
    background: rgba(0,0,0,.05);
    color: #0c4f57;
}

/* MAP */
.map {
    margin: 30px auto;
    width: 90%;
    max-width: 420px;
    height: 150px;
    border-radius: 18px;
    overflow: hidden;
    background: #eee; /* لون مؤقت */
}

/* FLOAT BAR */
.floatingBar {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    border-radius: 40px;
    display: flex;
    gap: 18px;
    background: rgba(255,255,255,.2);
    backdrop-filter: blur(10px); /* يعمل جيداً إذا كان وحيداً */
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 20px rgba(0,0,0,.2);
    z-index: 1000;
}
</style>

<div class="page-wrapper">
    <div class="logoStrip">
        <img class="logo" src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png" alt="Nadim Foundation">
    </div>
    
    </div>
