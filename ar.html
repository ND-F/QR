```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مؤسسة نديم</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BODY */

body{
margin:0;
font-family:Tahoma;
text-align:center;
direction:rtl;
background:#0f2024;
color:#e9f6f7;
transition:.6s;
padding-bottom:120px;
}

.light{
background:#f4f7f8;
color:#0c4f57;
}

/* HERO */

.hero{
height:130px;
background:linear-gradient(-45deg,#0c4f57,#0f6c75,#148b96,#0c4f57);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LOGO */

.logoStrip{
background:#e9f6f7;
padding:18px;
border-radius:0 0 40px 40px;
}

.logo{
width:140px;
opacity:0;
transform:translateY(20px);
animation:fadeLogo 1.2s forwards;
}

@keyframes fadeLogo{
to{
opacity:1;
transform:translateY(0);
}
}

/* ICON GRID */

.iconGrid{
width:90%;
max-width:420px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
justify-items:center;
}

/* ICON BOX */

.iconBtn{
display:flex;
align-items:center;
justify-content:center;

width:80px;
height:80px;

border-radius:22px;
font-size:30px;

text-decoration:none;

color:#28c3cc;

background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);

box-shadow:
0 10px 30px rgba(0,0,0,.35),
inset 0 1px 0 rgba(255,255,255,.08);

transition:.35s;

opacity:0;
transform:translateY(30px);
animation:iconIn .8s forwards;
}

/* stagger animation */

.iconBtn:nth-child(1){animation-delay:.1s}
.iconBtn:nth-child(2){animation-delay:.2s}
.iconBtn:nth-child(3){animation-delay:.3s}
.iconBtn:nth-child(4){animation-delay:.4s}
.iconBtn:nth-child(5){animation-delay:.5s}
.iconBtn:nth-child(6){animation-delay:.6s}
.iconBtn:nth-child(7){animation-delay:.7s}

@keyframes iconIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* HOVER */

.iconBtn:hover{
transform:translateY(-6px) scale(1.08);

box-shadow:
0 0 18px #1fa3ad,
0 18px 40px rgba(0,0,0,.45);

animation:shake .25s;
}

@keyframes shake{
0%{transform:translateY(-6px) rotate(0)}
25%{transform:translateY(-6px) rotate(2deg)}
50%{transform:translateY(-6px) rotate(-2deg)}
75%{transform:translateY(-6px) rotate(1deg)}
100%{transform:translateY(-6px) rotate(0)}
}

/* LIGHT MODE ICONS */

.light .iconBtn{
background:rgba(255,255,255,.75);
color:#0c4f57;

box-shadow:
0 10px 25px rgba(0,0,0,.12),
inset 0 1px 0 rgba(255,255,255,.8);
}

.light .iconBtn:hover{
box-shadow:
0 0 14px #0c4f57,
0 12px 25px rgba(0,0,0,.2);
}

/* MAP */

.map{
margin:30px auto;
width:90%;
max-width:420px;
height:150px;
border-radius:18px;
overflow:hidden;
}

/* FLOATING BAR */

.floatingBar{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
padding:12px 22px;
border-radius:40px;

display:flex;
gap:20px;

backdrop-filter:blur(14px);
background:rgba(255,255,255,.15);

box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.ctrl{
font-size:22px;
cursor:pointer;
transition:.3s;
}

.ctrl:active{
transform:scale(.8) rotate(180deg);
}

/* FOOTER */

.footer{
margin:30px;
opacity:.6;
}

</style>
</head>

<body>

<div class="hero"></div>

<div class="logoStrip">
<img class="logo"
src="https://raw.githubusercontent.com/ND-F/Q/main/images/logo-nadim.png">
</div>


<div class="iconGrid">

<a class="iconBtn" href="https://www.nadimfoundation.org/">
<i class="fa-solid fa-globe"></i>
</a>

<a class="iconBtn" href="https://www.facebook.com/share/1Ak98MWsP4/">
<i class="fa-brands fa-facebook-f"></i>
</a>

<a class="iconBtn" href="https://www.instagram.com/nadimfoundation">
<i class="fa-brands fa-instagram"></i>
</a>

<a class="iconBtn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA">
<i class="fa-brands fa-youtube"></i>
</a>

<a class="iconBtn" href="https://wa.me/201227799564">
<i class="fa-brands fa-whatsapp"></i>
</a>

<a class="iconBtn" href="mailto:info@nadimfoundation.org">
<i class="fa-solid fa-envelope"></i>
</a>

<a class="iconBtn" href="https://www.linkedin.com/company/nadimfoundation/">
<i class="fa-brands fa-linkedin-in"></i>
</a>

</div>


<div class="map">
<iframe src="https://maps.google.com/maps?q=cairo&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="100%" frameborder="0"></iframe>
</div>


<div class="floatingBar">
<div class="ctrl" onclick="share()">🔗</div>
<div class="ctrl" id="themeBtn" onclick="toggleTheme()">☀️</div>
<a class="ctrl" href="en.html">🌐</a>
</div>


<div class="footer">مؤسسة نديم © ®</div>


<script>

const body=document.body;
const btn=document.getElementById("themeBtn");

if(localStorage.getItem("theme")==null){
if(window.matchMedia('(prefers-color-scheme: light)').matches){
body.classList.add("light");
btn.innerHTML="🌙";
}else{
btn.innerHTML="☀️";
}
}else{
if(localStorage.getItem("theme")=="light"){
body.classList.add("light");
btn.innerHTML="🌙";
}else{
btn.innerHTML="☀️";
}
}

function toggleTheme(){
body.classList.toggle("light");

if(body.classList.contains("light")){
btn.innerHTML="🌙";
localStorage.setItem("theme","light");
}else{
btn.innerHTML="☀️";
localStorage.setItem("theme","dark");
}
}

function share(){
navigator.share({
title:"مؤسسة نديم",
url:window.location.href
});
}

</script>

</body>
</html>
```
